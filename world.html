<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas of the Known World</title>
    <style>
        /* --- 1. CORE VARIABLES (Fallback if not imported from main sheet) --- */
        :root {
            --parchment: #eaddc5;
            --iron: #2c2c2c;
            --blood: #8a0303;
            --gold: #b89b5e;
            --ink: #1a1a1a;
            --font-hand: 'Georgia', serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: var(--parchment);
        }

        /* --- 2. LAYOUT GRID --- */
        .world-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        /* --- 3. THE MAP SECTION --- */
        .map-section {
            position: relative;
            background: var(--iron);
            border: 4px solid var(--gold);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.9);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .map-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ensures the whole map stays visible */
        }

        /* --- 4. BLOOD RED PULSING PINS --- */
        .map-pin {
            position: absolute;
            width: 18px;
            height: 18px;
            background: var(--blood);
            border: 2px solid var(--gold);
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%); /* Centers pin exactly on coordinate */
            box-shadow: 0 0 10px rgba(138, 3, 3, 0.8);
            animation: pulse 2s infinite;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .map-pin:hover {
            transform: translate(-50%, -50%) scale(1.4);
            background: #ff1a1a;
            z-index: 10;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(138, 3, 3, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(138, 3, 3, 0); }
            100% { box-shadow: 0 0 0 0 rgba(138, 3, 3, 0); }
        }

        /* --- 5. LORE PANEL --- */
        .lore-section {
            background: #111;
            border: 4px solid var(--iron);
            border-radius: 8px;
            padding: 20px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        .lore-header {
            font-size: 24pt;
            font-weight: 900;
            color: var(--gold);
            border-bottom: 2px solid var(--blood);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-align: center;
        }

        .lore-content {
            background: var(--parchment);
            color: var(--ink);
            padding: 20px;
            border: 2px solid var(--iron);
            border-radius: 4px;
            flex-grow: 1;
            font-family: var(--font-hand);
            font-size: 14pt;
            line-height: 1.6;
            overflow-y: auto;
        }

        .lore-stat-box {
            background: rgba(138, 3, 3, 0.1);
            border-left: 4px solid var(--blood);
            padding: 10px;
            margin-top: 15px;
            font-size: 12pt;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="world-container">
    <div class="map-section">
        <div class="map-wrapper">
            <img src="RPG-World4K (1).jpg" alt="Atlas of the Known World">
            
            <div class="map-pin" style="top: 25%; left: 19%;" onclick="loadLore('rysahm')" title="Rysahm Ashlands"></div>
            <div class="map-pin" style="top: 36%; left: 77%;" onclick="loadLore('dwarven')" title="Dwarven Kingdoms"></div>
            <div class="map-pin" style="top: 48%; left: 93%;" onclick="loadLore('dragon')" title="Dragon Kingdom"></div>
            <div class="map-pin" style="top: 80%; left: 45%;" onclick="loadLore('blight')" title="Land of Blight"></div>
            <div class="map-pin" style="top: 15%; left: 81%;" onclick="loadLore('barbarian')" title="Barbarian Hordes"></div>
        </div>
    </div>

    <div class="lore-section">
        <div class="lore-header" id="lore-title">The Known World</div>
        <div class="lore-content">
            <div id="lore-desc">
                Welcome to the Atlas. Select a pulsing marker on the map to access geographical records, regional threats, and local inhabitants.
            </div>
            <div id="lore-stats" class="lore-stat-box" style="display: none;"></div>
        </div>
    </div>
</div>

<script>
    // --- LORE DICTIONARY ---
    const worldLore = {
        'rysahm': {
            title: "Rysahm Ashlands",
            desc: "A brutal, volcanic wasteland where the sky is perpetually choked with smoke. The extreme heat makes standard travel impossible without magical warding.",
            stats: "Primary Encounters: The Pyreborn, Fire Elementals<br>Hazard: Extreme Heat (Wound Mitigation halved)"
        },
        'dwarven': {
            title: "Dwarven Kingdoms",
            desc: "A sprawling network of mountain strongholds. At the heart lies the impenetrable Birn Uluhm fortress, renowned for its advanced mechanical defenses.",
            stats: "Primary Encounters: Birn Uluhm Dwarves, Golems<br>Resources: High-tier Iron and Gold forging"
        },
        'dragon': {
            title: "Dragon Kingdom",
            desc: "An isolated eastern continent ruled by ancient wyrms. The terrain is scarred by centuries of elemental breath weapons, creating dangerous, unpredictable magic zones.",
            stats: "Primary Encounters: Dragons, Drakes<br>Hazard: Unstable Magic Zones"
        },
        'blight': {
            title: "Land of Blight",
            desc: "A dead, corrupted continent in the far south. Nothing natural grows here. The very soil drains life force from those who walk upon it unprotected.",
            stats: "Primary Encounters: Undead, Necromancers<br>Hazard: Continual drain on Spirit Points"
        },
        'barbarian': {
            title: "Barbarian Hordes",
            desc: "The frozen northern peaks. The harsh climate breeds unparalleled resilience among the tribes that survive here, producing fearsome warriors.",
            stats: "Primary Encounters: Berserkers, Frost Giants<br>Hazard: Freezing Winds"
        }
    };

    // --- INTERACTIVE LOGIC ---
    function loadLore(regionId) {
        const data = worldLore[regionId];
        if (data) {
            document.getElementById('lore-title').innerText = data.title;
            document.getElementById('lore-desc').innerHTML = data.desc;
            
            const statsBox = document.getElementById('lore-stats');
            if (data.stats) {
                statsBox.innerHTML = data.stats;
                statsBox.style.display = 'block';
            } else {
                statsBox.style.display = 'none';
            }
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1000">
    <title>Path of the Unknown - Bestiary</title>
    <style>
:root { 
        /* Slate & Crimson Theme */
        --iron: #02070e;      
        --blood: #A81818;     
        --parchment: #f3e7c9;
        --gold: #B8860B;      
        --ink: #111111;       
        --white: #FCF7EB;     
        --card-bg: #f3e7c9; 
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
        background: #1E1E24; 
        color: var(--ink); 
        font-family: 'Courier New', Courier, monospace; 
        padding: 20px; 
        overflow-x: hidden; 
    }

    /* --- ENCOUNTER STATS BAR --- */
    .encounter-stats {
        background: var(--ink);
        color: var(--gold);
        padding: 8px 15px;
        border-radius: 4px;
        font-size: 10pt;
        font-weight: bold;
        display: flex;
        gap: 25px;
        border: 2px solid var(--gold);
        box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        margin-bottom: 15px;
        width: fit-content;
    }
    .stat-num { color: var(--white); font-size: 11pt; margin-left: 5px; }

    /* --- LAYOUT WRAPPER --- */
    .main-wrapper {
        width: 100%;
        max-width: 950px; 
        margin: 0 auto; 
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* --- ELEGANT INK & BLOOD HEADER --- */
    .top-bar {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: var(--ink); 
        border: 3px solid var(--blood); 
        border-bottom: 6px solid var(--gold); 
        border-radius: 6px;
        padding: 20px 10px;
        gap: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        margin-bottom: 25px;
    }

    .page-title {
        width: 100%;
        text-align: center;
        font-size: 28pt; 
        font-weight: 900; 
        color: var(--gold); 
        text-transform: uppercase; 
        letter-spacing: 5px; 
        text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        margin-bottom: 0;
    }

    .vault-controls { 
        display: flex; 
        gap: 6px; 
        flex-wrap: nowrap; 
        justify-content: center; 
        width: 100%;
    }
    
    .btn-vault { 
        background: var(--white); 
        color: var(--ink); 
        border: 2px solid var(--ink); 
        padding: 6px 12px; 
        font-weight: 900; 
        cursor: pointer; 
        font-size: 9.5pt; 
        text-transform: uppercase; 
        font-family: inherit; 
        transition: 0.2s; 
        border-radius: 2px;
        border-bottom: 3px solid var(--blood); 
        white-space: nowrap; 
    }
    
    .btn-vault:hover { 
        background: var(--gold); 
        color: var(--ink); 
        border-color: var(--ink); 
    }
    
    .btn-add { background: var(--blood); color: var(--white); }
    
    .back-to-top {
        position: fixed; 
        bottom: 30px; 
        right: 30px;
        background: var(--gold); 
        color: var(--ink);
        border: 3px solid var(--ink); 
        border-radius: 50%;
        width: 60px; 
        height: 60px; 
        font-size: 24pt; 
        font-weight: 900;
        cursor: pointer; 
        display: none; 
        align-items: center; 
        justify-content: center;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        transition: all 0.2s; 
        z-index: 9999; 
    }

    /* --- MONSTER CARD GRID --- */
    .bestiary-container { width: 100%; display: grid; grid-template-columns: 1fr; gap: 25px; }

    .monster-card {
        background: var(--card-bg); border: 5px solid var(--ink);
        box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        display: flex; flex-direction: column; padding: 20px; position: relative; border-radius: 4px;
        page-break-inside: avoid;
    }

    .m-top-section { 
        display: grid;
        grid-template-areas: 
            "portrait name"
            "portrait desc"
            "type     desc";
        grid-template-columns: 220px 1fr; 
        grid-template-rows: max-content 1fr max-content;
        gap: 10px 20px; 
        border-bottom: 4px solid var(--gold); 
        padding-bottom: 15px; 
        margin-bottom: 15px; 
    }

    .m-portrait-box { grid-area: portrait; width: 220px; height: 220px; border: 3px dashed var(--gold); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; }
    .m-name-row { grid-area: name; display: flex; gap: 10px; align-items: flex-end; }
    .m-name { flex: 1; background: var(--white); border: 2px solid var(--ink); border-bottom: 4px solid var(--blood); color: var(--ink); font-size: 13pt; font-weight: 900; text-transform: uppercase; outline: none; padding: 5px 10px; }
    .m-size-select { width: 140px; background: var(--white); border: 2px solid var(--ink); border-bottom: 4px solid var(--blood); color: var(--ink); font-size: 14pt; font-weight: bold; height: 43px; cursor: pointer; }

    .m-type-row { grid-area: type; display: flex; width: 220px; border: 2px solid var(--ink); background: var(--white); border-bottom: 3px solid var(--blood); }
    .m-type-row input { background: transparent; border: none; color: var(--ink); font-size: 11pt; font-weight: bold; padding: 6px; outline: none; text-align: center; }

    .desc-block { grid-area: desc; display: flex; flex-direction: column; background: var(--white); border: 3px solid var(--ink); padding: 6px 10px; }
    .desc-block label { color: var(--blood); font-size: 10pt; font-weight: 900; margin-bottom: 2px; }
    .desc-block textarea { width: 100%; flex: 1; font-size: 12pt; font-weight: bold; border: none; background: transparent; color: var(--ink); outline: none; resize: vertical; min-height: 40px; }

    .m-stats-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; background: var(--ink); border: 4px solid var(--gold); margin-bottom: 15px; }
    .stat-box { background: var(--white); display: flex; flex-direction: column; text-align: center; border-bottom: 3px solid var(--blood); }
    .stat-lbl { font-size: 9.5pt; font-weight: 900; color: var(--gold); background: var(--ink); padding: 5px 0; border-bottom: 2px solid var(--ink); }
    .stat-box input { width: 100%; border: none; text-align: center; font-size: 16pt; font-weight: 900; padding: 8px 0; background: var(--white); outline: none; }

    .m-combat-wrapper { display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
    .m-combat-table { display: grid; grid-template-columns: 80px 80px 120px 80px; gap: 2px; background: var(--ink); border: 4px solid var(--gold); flex: 0 0 366px; }
    .m-combat-table > div { background: var(--ink); color: var(--gold); text-align: center; font-size: 10pt; font-weight: 900; padding: 6px; }
    .m-combat-table > .c-lbl { background: var(--gold); color: var(--ink); display: flex; align-items: center; justify-content: center; }
    .m-combat-table > input { background: var(--white); color: var(--ink); text-align: center; border: none; border-bottom: 3px solid var(--blood); font-size: 12pt; font-weight: 900; outline: none; }

    .m-combat-right { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 300px; }
    .m-combat-right-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .c-lbl-box { font-size: 10pt; font-weight: 900; color: var(--ink); text-transform: uppercase; }
    .m-cast-select { flex: 1; background: var(--white); border: 2px solid var(--ink); border-bottom: 3px solid var(--blood); padding: 4px 8px; font-weight: bold; }
    .c-short-in { text-align: center; background: var(--white); border: 2px solid var(--ink); border-bottom: 3px solid var(--blood); font-weight: bold; width: 60px; padding: 4px; }

    .detail-row { display: flex; align-items: center; gap: 10px; }
    .detail-row label { font-size: 10pt; font-weight: 900; width: 55px; }
    .detail-row input { flex: 1; background: var(--white); border: 2px solid var(--ink); border-bottom: 3px solid var(--blood); padding: 4px 8px; font-weight: bold; }

    .m-special { display: flex; flex-direction: column; }
    .m-special label { font-size: 11pt; font-weight: 900; color: var(--blood); text-transform: uppercase; border-bottom: 3px solid var(--gold); margin-bottom: 6px; }
    .m-special textarea { width: 100%; min-height: 150px; border: 2px solid var(--ink); background: var(--white); padding: 12px; font-family:inherit; font-size: 13pt; font-weight: bold; color: var(--ink); outline: none; }

    .btn-remove { position: absolute; top: 15px; right: 15px; background: var(--blood); color: white; border: 2px solid var(--ink); border-radius: 50%; width: 30px; height: 30px; font-weight: bold; cursor: pointer; z-index: 10; }
    .alpha-tabs { display: flex; justify-content: space-between; gap: 3px; margin-bottom: 15px; }
    .alpha-tab { flex: 1; background: var(--white); color: var(--ink); border: 2px solid var(--ink); height: 34px; font-weight: 900; cursor: pointer; border-bottom: 3px solid var(--blood); }
    .alpha-tab:hover { background: var(--blood); color: white; }

    .roll-log { width: 100%; background: var(--white); border: 2px solid var(--ink); padding: 8px; text-align: center; font-weight: bold; border-bottom: 3px solid var(--gold); }
    .dice-vault { display: flex; align-items: center; background: var(--white); padding: 8px 15px; border: 3px solid var(--ink); gap: 8px; }
    .dice-btn { background: var(--white); border: 2px solid var(--ink); padding: 5px 10px; font-weight: 900; cursor: pointer; }
    .roll-result { min-width: 50px; height: 40px; background: var(--ink); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 18pt; font-weight: 900; border: 2px solid var(--gold); }

    /* --- PRINT SYSTEM RECONSTRUCTION --- */
    @media print {
        .top-bar, .vault-controls, .alpha-tabs, .back-to-top, .btn-remove, .encounter-stats, .dice-vault, .roll-log, #clear-log-btn { display: none !important; }
        @page { size: letter portrait; margin: 0.4in; }
        body { background: white !important; padding: 0 !important; margin: 0 !important; }
        .main-wrapper { max-width: 100% !important; margin: 0 !important; }
        .monster-card { border: 3px solid var(--ink) !important; background: var(--card-bg) !important; page-break-inside: avoid !important; margin-bottom: 30px !important; box-shadow: none !important; -webkit-print-color-adjust: exact; }
        input, textarea, select { background: var(--white) !important; border-bottom: 2px solid var(--blood) !important; -webkit-print-color-adjust: exact; }
        .p-text { color: rgba(0,0,0,0.2) !important; }
    }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="top-bar">
        <div class="page-title">Path of the Unknown</div>
        <div style="color: var(--blood); font-weight: bold; font-style: italic; font-size: 14pt;">Codex of Beasts & Summons</div>
        
        <div class="encounter-stats">
            <a href="index.html" class="btn-vault" style="text-decoration: none; display: flex; align-items: center;">🏠 Home</a>
            <span>TOTAL MONSTERS: <span id="monster-count" class="stat-num">0</span></span>
            <span>EST. PRINT PAGES: <span id="page-count" class="stat-num">0</span></span>
        </div>
        
        <div class="vault-controls">
            <button class="btn-vault btn-add" onclick="addCreature()">+ Add Creature</button>
            <button class="btn-vault" id="btn-official" onclick="fetchOfficialBestiary('Clean_Bestiary.rpgb')">📜 Load Official Codex</button>
            <button class="btn-vault btn-sort" id="btn-sort" onclick="sortBestiary()">A-Z Sort</button>
            <button class="btn-vault" id="btn-save" onclick="saveBestiary()">💾 Save Encounter</button>
            <button class="btn-vault" id="btn-load" onclick="document.getElementById('load-input').click()">📂 Load Encounter</button>
            <button class="btn-vault" onclick="window.print()">🖨️ PDF</button>
            <input type="file" id="load-input" accept=".rpgb" style="display:none" onchange="loadBestiary(this)">
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%;">
            <div class="dice-vault">
                <button class="dice-btn" onclick="rollDice(4)">d4</button>
                <button class="dice-btn" onclick="rollDice(6)">d6</button>
                <button class="dice-btn" onclick="rollDice(8)">d8</button>
                <button class="dice-btn" onclick="rollDice(10)">d10</button>
                <button class="dice-btn" onclick="rollDice(12)">d12</button>
                <button class="dice-btn" onclick="rollDice(20)">d20</button>
                <button class="dice-btn" onclick="rollDice(100)">d100</button>
                <div class="roll-result" id="current-roll">--</div>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; width: 100%; max-width: 800px;">
                <div class="roll-log" id="roll-log" style="flex: 1;">ROLL LOG: (Waiting for first roll...)</div>
                <button id="clear-log-btn" style="background: var(--blood); color: var(--white); border: 2px solid var(--ink); padding: 5px 10px; font-weight: 900; cursor: pointer; border-radius: 2px; font-family: inherit; font-size: 9pt;">RESET</button>
            </div>
        </div>
    </div>

    <div class="alpha-tabs" id="alpha-tabs"></div>
    <div class="bestiary-container" id="bestiary-grid"></div>
</div>

<button class="back-to-top" id="btn-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Back to Top">⬆</button>

<script>
    window.addEventListener('scroll', () => {
        const btn = document.getElementById('btn-top');
        if (btn) btn.style.display = window.scrollY > 400 ? 'flex' : 'none';
    });

    let rollHistory = [];
    function rollDice(sides) {
        const result = Math.floor(Math.random() * sides) + 1;
        document.getElementById('current-roll').innerText = result;
        rollHistory.unshift(`d${sides}: ${result}`);
        if (rollHistory.length > 7) rollHistory.pop();
        document.getElementById('roll-log').innerText = "ROLL LOG: " + rollHistory.join(" | ");
        const resBox = document.getElementById('current-roll');
        resBox.style.boxShadow = "0 0 25px var(--gold)";
        setTimeout(() => { resBox.style.boxShadow = "0 0 10px rgba(184, 134, 11, 0.4)"; }, 200);
    }

    function resetLog() {
        rollHistory = [];
        document.getElementById('roll-log').innerText = "ROLL LOG: (No rolls yet)";
        document.getElementById('current-roll').innerText = "--";
    }

    document.addEventListener('click', function(e) {
        if (e.target && e.target.id === 'clear-log-btn') resetLog();
    });

    const cardTemplate = `
        <div class="monster-card">
            <button class="btn-remove" onclick="this.parentElement.remove(); updateMonsterCount(); autoSaveBestiary();" title="Delete Monster">X</button>
            <div class="m-top-section">
                <div class="m-portrait-box" onclick="this.querySelector('input').click()">
                    <span class="p-text">PORTRAIT</span>
                    <img class="p-img" style="display:none; width:100%; height:100%; object-fit:cover;">
                    <input type="file" accept="image/*" style="display:none" onchange="loadPortrait(this)">
                </div>
                <div class="m-name-row">
                    <input type="text" class="m-name" placeholder="Name">
                    <select class="m-size-select">
                        <option>Tiny</option><option>Small</option><option selected>Medium</option>
                        <option>Large</option><option>Giant</option><option>Enormous</option><option>Titanic</option>
                    </select>
                </div>
                <div class="m-type-row">
                    <input type="text" placeholder="Type" style="flex: 3;">
                    <input type="text" placeholder="PG#" title="Source Page Number" style="flex: 1; text-align: center; border-left: 2px solid var(--ink); font-weight: bold; color: var(--blood);">
                </div>
                <div class="desc-block"><label>DESCRIPTION:</label><textarea placeholder="Lore..."></textarea></div>
            </div>
            <div class="m-stats-grid">
                <div class="stat-box"><div class="stat-lbl">Agl</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Awa</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Cha</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Int</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Phy</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Will</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Move</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Act</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Def</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">WM-Arm</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">WM-B/S</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">WM-DP</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Wounds</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Focus</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Reroll</div><input type="text"></div>
                <div class="stat-box"><div class="stat-lbl">Luck</div><input type="text"></div>
            </div>
            <div class="m-combat-wrapper">
                <div class="m-combat-table">
                    <div>Type</div><div>To-Hit</div><div>+Wounds</div><div>+Heal</div>
                    <div class="c-lbl">Melee</div><input type="text"><input type="text"><input type="text">
                    <div class="c-lbl">Ranged</div><input type="text"><input type="text"><input type="text">
                    <div class="c-lbl">Casting</div><input type="text"><input type="text"><input type="text">
                </div>
                <div class="m-combat-right">
                    <div class="m-combat-right-top">
                        <label class="c-lbl-box">Casting</label>
                        <select class="m-cast-select"><option>None</option><option>Druid</option><option>Faith</option><option>Ki</option><option>Necromantic</option><option>Shaman</option><option>Wizardry</option></select>
                        <label class="c-lbl-box">Fear</label><input type="text" maxlength="4" class="c-short-in">
                        <label class="c-lbl-box">Mob</label><input type="text" maxlength="8" class="c-short-in">
                    </div>
                    <div class="detail-row"><label>Gear</label><input type="text"></div>
                    <div class="detail-row"><label>Melee</label><input type="text"></div>
                    <div class="detail-row"><label>Range</label><input type="text"></div>
                </div>
            </div>
            <div class="m-special"><label>Special Abilities & Traits</label><textarea placeholder="Rules..."></textarea></div>
        </div>`;

    const dbName = "PowerOfThreeBestiary";
    const storeName = "Creatures";

    async function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(dbName, 3);
            request.onupgradeneeded = (e) => {
                let db = e.target.result;
                if (!db.objectStoreNames.contains(storeName)) db.createObjectStore(storeName);
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveToDB(data) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).put(data, "currentBestiary");
            tx.oncomplete = () => resolve();
            tx.onerror = (e) => reject(e.target.error);
        });
    }

    async function getFromDB() {
        const db = await openDB();
        return new Promise((resolve) => {
            const request = db.transaction(storeName).objectStore(storeName).get("currentBestiary");
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => resolve(null);
        });
    }

    async function fetchOfficialBestiary(fileName) {
        const btn = document.getElementById('btn-official');
        try {
            btn.innerText = "⏳ Summoning...";
            const response = await fetch(fileName);
            if (!response.ok) throw new Error("Codex not found.");
            const data = await response.json();
            renderBestiary(data);
            await saveToDB(data);
            btn.innerText = "✅ Loaded!";
        } catch(err) {
            btn.innerText = "❌ Error!";
        } finally {
            setTimeout(() => btn.innerText = "📜 Load Official Codex", 2000);
        }
    }

    function updateMonsterCount() {
        const count = document.querySelectorAll('.monster-card').length;
        const countEl = document.getElementById('monster-count');
        const pageEl = document.getElementById('page-count');
        if (countEl) countEl.innerText = count;
        if (pageEl) pageEl.innerText = Math.ceil(count / 2.5); 
    }

    function addCreature() { 
        const grid = document.getElementById('bestiary-grid');
        grid.insertAdjacentHTML('afterbegin', cardTemplate); 
        const newCard = grid.firstElementChild;
        updateMonsterCount();
        if (typeof autoSaveBestiary === 'function') autoSaveBestiary();
        return newCard; 
    }

    function getDynamicImagePath(monsterName) {
        if (!monsterName) return 'https://raw.githubusercontent.com/YOUR_USERNAME/Path-of-the-Unknown/main/images/placeholder.png'; 
        
        const safeName = monsterName.toLowerCase().trim().replace(/[^a-z0-9]/g, '_');
        
        // The ?v= trick forces GitHub to bypass the 5-minute delay!
        return `https://raw.githubusercontent.com/YOUR_USERNAME/Path-of-the-Unknown/main/images/${safeName}.png?v=${new Date().getTime()}`;
    }

    function renderBestiary(cardsData) {
        const grid = document.getElementById('bestiary-grid');
        grid.innerHTML = ''; 
        if (!cardsData || !Array.isArray(cardsData)) return;

        for (let i = cardsData.length - 1; i >= 0; i--) {
            const cardState = cardsData[i];
            const newCard = addCreature(); 
            const inputs = newCard.querySelectorAll('input:not([type="file"]), select, textarea');
            const valsToLoad = migrateData(cardState.values || []);
            
            valsToLoad.forEach((val, index) => { 
                if (inputs[index]) {
                    if (inputs[index].type === 'checkbox') inputs[index].checked = val;
                    else inputs[index].value = val; 
                }
            });

            const monsterName = valsToLoad[0] || "Unknown_Monster";
            const portraitBox = newCard.querySelector('.m-portrait-box');
            const imgEl = portraitBox?.querySelector('.p-img');
            
            if (imgEl && portraitBox) {
                imgEl.src = getDynamicImagePath(monsterName);
                imgEl.style.display = 'block';
                portraitBox.querySelector('.p-text').style.display = 'none';
                portraitBox.style.borderStyle = 'solid';

                imgEl.onerror = function() {
                    this.style.display = 'none';
                    portraitBox.querySelector('.p-text').style.display = 'block';
                    portraitBox.style.borderStyle = 'dashed';
                };
            }
        }
        buildAlphaTabs();
        updateMonsterCount();
    }

    let saveTimeout;
    async function autoSaveBestiary() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(async () => {
            const cardsData = [];
            document.querySelectorAll('.monster-card').forEach(card => {
                let cardState = { values: [], imgSrc: "" };
                card.querySelectorAll('input:not([type="file"]), select, textarea').forEach(el => {
                    cardState.values.push(el.type === 'checkbox' ? el.checked : el.value);
                });
                const img = card.querySelector('.p-img');
                if (img && img.style.display !== 'none') cardState.imgSrc = img.src;
                cardsData.push(cardState);
            });
            await saveToDB(cardsData);
        }, 800);
    }

    window.loadBestiary = function(input) {
        if (input.files && input.files[0]) {
            const btn = document.getElementById('btn-load');
            btn.innerText = "⏳ Loading...";

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    renderBestiary(data);
                    await saveToDB(data);
                    btn.innerText = "✅ Synced!";
                } catch(err) { 
                    btn.innerText = "❌ Error!";
                } finally {
                    setTimeout(() => btn.innerText = "📂 Load Encounter", 2000);
                    input.value = ''; // Resets the input so the exact same file can be selected again
                }
            };
            reader.readAsText(input.files[0]);
        }
    };

    function saveBestiary() {
        const btn = document.getElementById('btn-save');
        btn.innerText = "⏳ Saving...";

        const cardsData = [];
        document.querySelectorAll('.monster-card').forEach(card => {
            let cardState = { values: [], imgSrc: "" };
            card.querySelectorAll('input:not([type="file"]), select, textarea').forEach(el => {
                cardState.values.push(el.type === 'checkbox' ? el.checked : el.value);
            });
            const img = card.querySelector('.p-img');
            if (img && img.style.display !== 'none') cardState.imgSrc = img.src;
            cardsData.push(cardState);
        });
        const blob = new Blob([JSON.stringify(cardsData)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `bestiary_encounter.rpgb`;
        a.click();
        
        btn.innerText = "✅ Saved!";
        setTimeout(() => btn.innerText = "💾 Save Encounter", 2000);
    }

    function buildAlphaTabs() {
        const container = document.getElementById('alpha-tabs');
        if (!container) return;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
        container.innerHTML = alphabet.map(l => `<button class="alpha-tab" onclick="jumpToLetter('${l}')">${l}</button>`).join('');
    }

    function jumpToLetter(letter) {
        const cards = document.querySelectorAll('.monster-card');
        for (let card of cards) {
            const nameInput = card.querySelector('.m-name');
            if (nameInput && nameInput.value.trim().toUpperCase().startsWith(letter)) {
                window.scrollTo({ top: card.getBoundingClientRect().top + window.scrollY - 30, behavior: 'smooth' });
                return;
            }
        }
    }

    function loadPortrait(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const box = input.parentElement;
                box.querySelector('.p-img').src = e.target.result;
                box.querySelector('.p-img').style.display = 'block';
                box.querySelector('.p-text').style.display = 'none';
                box.style.borderStyle = 'solid';
                autoSaveBestiary();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function migrateData(valsToLoad) {
        if (!valsToLoad) return [];
        const knownSizes = ["Tiny", "Small", "Medium", "Large", "Giant", "Enormous", "Titanic"];
        if (valsToLoad.length >= 3 && knownSizes.includes(valsToLoad[2])) {
            const tempType = valsToLoad[1];
            valsToLoad[1] = valsToLoad[2];
            valsToLoad[2] = tempType;
        }
        if (valsToLoad.length === 36) valsToLoad.splice(3, 0, ""); 
        return valsToLoad;
    }

    function sortBestiary() {
        const btn = document.getElementById('btn-sort');
        
        const grid = document.getElementById('bestiary-grid');
        const cards = Array.from(grid.querySelectorAll('.monster-card'));
    
        cards.sort((a, b) => {
            const nameA = a.querySelector('.m-name').value.trim().toUpperCase();
            const nameB = b.querySelector('.m-name').value.trim().toUpperCase();
            return nameA.localeCompare(nameB);
        });

        grid.innerHTML = '';
        cards.forEach(card => grid.appendChild(card));
        autoSaveBestiary();
        
        if (btn) {
            btn.innerText = "✅ Sorted!";
            setTimeout(() => btn.innerText = "A-Z Sort", 2000);
        }
    }
    
    async function initSystem() {
        const savedData = await getFromDB();
        if (savedData && savedData.length > 0) {
            renderBestiary(savedData);
        } else {
            buildAlphaTabs();
            updateMonsterCount();
        }
    }

    document.addEventListener('input', (e) => {
        if (e.target.closest('.monster-card')) autoSaveBestiary();
    });

    window.onload = initSystem;
</script>
</body>
</html>
